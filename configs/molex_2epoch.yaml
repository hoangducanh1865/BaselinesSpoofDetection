# MoLEx hyperparameters + paths.
#
# Mirrors the JSON structure baselines/molex/src/main_molex.py expects
# (top-level batch_size/num_epochs + model_config + optim_config), but
# overrides the upstream repo's default num_MOE_layer (6) with the paper's
# best ASVspoof5 setting (12 MoLEx layers / 12 experts / top-4 / rank 32 —
# the config that reaches 5.56% EER per stuff/reference_papers/molex/molex.pdf).
# The adapter (baselines/molex/_adapter.py) merges this into a temp JSON
# config rather than editing baselines/molex/configs/molex_ssl.conf in place.

batch_size: 16
num_epochs: 2

cudnn_deterministic_toggle: true
cudnn_benchmark_toggle: false

model_config:
  num_expert: 12
  num_MOE_layer: 12
  expert_rank: 32
  topk: 4
  SSL_dim: 1024
  model_name: Model_MoLEx
  SSL_layer_num: 12
  Finetune_id: "False"
  nb_samp: 64600
  # Overridable via env MOLEX_WAVLM_CHECKPOINT.
  wavlm_checkpoint: /home/user14/anhhd/spoof/pretrained_ssl_models/wavlm_large/WavLM-Large.pt

optim_config:
  optimizer: adamw_separate
  amsgrad: "False"
  base_lr: 0.0001
  lora_lr: 0.00001
  lr_min: 0.0002
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  lora_weight_decay: 0.00005
  scheduler: LinearWarm_ExpDecay
  lr_decay: 0.5
  decay_LR_max: 50
  decay_LR_warm: 5

# Repo-level paths. data_root is keyed by --dataset; override the whole map's
# base via env SPOOF_DATA_ROOT (e.g. if the mount point differs from the
# headnode default). meta_root/output_dir are repo-relative and land under
# outputs/ (gitignored, server-only).
paths:
  data_root:
    asvspoof5: /home/user14/anhhd/spoof/datasets/asvspoof5
    asvspoof2019la: /home/user14/anhhd/spoof/datasets/asvspoof2019/LA/LA
    asvspoof2019pa: /home/user14/anhhd/spoof/datasets/asvspoof2019/PA/PA
  meta_root: outputs/molex/meta
  output_dir: outputs/molex/runs
  fold: 1
  exp_idx: 0

# torchrun launch settings; num_gpu is overridden by bash/molex/submit-job.sh
# to match the SLURM --gres allocation.
runtime:
  num_gpu: 1
